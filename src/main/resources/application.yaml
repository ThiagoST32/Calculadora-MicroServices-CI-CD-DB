spring:
  application:
    name: CalculadoraMicroServicesDB

  cloud:
    vault:
      uri: http://localhost:8200
      token: vault-root-token
      kv:
        enabled: true
        backend: secret

  datasource:
    url: jdbc:mysql://localhost:3306/calc
    username: calcUserDB
#    username: ${spring.cloud.vault.secret.CalculadoraMicroServicesDB.calc.mysql.username}
#    password: ${spring.cloud.vault.secret.CalculadoraMicroServicesDB.calc.mysql.password}
    password: 123456
    driverClassName: com.mysql.cj.jdbc.Driver
    defer-datasource-initialization: true
  jpa:
    properties:
      hibernate:
        ddl-auto: update
        dialect: org.hibernate.dialect.MySQLDialect
      show-sql: true

server:
  port: 8081
