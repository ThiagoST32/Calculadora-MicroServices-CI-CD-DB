spring:
  application:
    name: CalculadoraMicroServicesDB
  h2:
    console:
      enabled: true
      path: /h2
  datasource:
    url: jdbc:h2:mem:mydb
    username: sa
    password: password
    driverClassName: org.h2.Driver
    defer-datasource-initialization: true
    console:
      enabled: true

server:
  port: 8080
