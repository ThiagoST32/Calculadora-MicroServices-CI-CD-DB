global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'calc-application-db'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['calc-application-db:8081']

  - job_name: 'vault-calc'
    metrics_path: '/v1/sys/metrics'
    params:
      format: ['prometheus']
    bearer_token: 'vault-root-token'
    static_configs:
      - targets: ['vault-calc:8200']

  - job_name: 'mysql-calc'
    static_configs:
      - targets: ['mysql-exporter:9104']