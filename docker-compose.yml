services:
  mysql:
    container_name: mysqlCalcDb
    build:
      context: Servers/MySQL/.
      dockerfile: Dockerfile
    volumes:
      - ./Servers/MySQL/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
#    depends_on:
#      - vault
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_ROOT_HOST: '%'
      MYSQL_USENAME_HOST: '%'
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - calc-db

  vault:
    container_name: vault
    image: hashicorp/vault:1.18.3
    volumes:
#      - ./entrypoint:/vault/script/
      - vault_data:/vault/file
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: vault-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev
#    entrypoint: ["/vault.sh"]
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    networks:
      - calc-db



