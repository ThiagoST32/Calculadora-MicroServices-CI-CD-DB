services:
  mysql-calc:
    container_name: mysql-calc
    build:
      context: .
      dockerfile: Servers/MySQL/Dockerfile
    volumes:
      - ./Servers/MySQL/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    depends_on:
      - vault-calc
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD_ROOT}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - calc-db

  vault-calc:
    container_name: vault-calc
    image: hashicorp/vault:1.18.3
    volumes:
      - ./vault/scripts/vault.sh:/vault/scripts/vault.sh
      - vault_data:/vault/file
    environment:
      VAULT_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev
    entrypoint: ["/vault/scripts/vault.sh"]
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    networks:
      - calc-db

  calc-application-db:
    container_name: calc-application-db
    build:
      context: .
      dockerfile: Servers/JavaApp/Dockerfile
    environment:
      VAULT_ADDR: ${VAULT_APLICATION_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      SPRING_CLOUD_VAULT_TOKEN: ${VAULT_TOKEN}
      SPRING_CLOUD_VAULT_URI: ${VAULT_APLICATION_ADDR}
    networks:
      - calc-db
    depends_on:
      mysql-calc:
        condition: service_healthy
      vault-calc:
        condition: service_started
    ports:
      - "8081:8081"
    restart: on-failure
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 10s
      retries: 5


volumes:
  db_data:
  vault_data:

networks:
  calc-db:
    driver: bridge